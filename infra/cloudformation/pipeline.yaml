AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline + CodeBuild for aws-eks-project (build stage only, deploy stage added Day 2)

Parameters:
  ProjectName:
    Type: String
    Default: aws-eks-project

  CodeConnectionArn:
    Type: String

  GitHubFullRepositoryId:
    Type: String
    Description: In the form owner/repo, e.g. yourusername/aws-eks-project

  GitHubBranch:
    Type: String
    Default: main

Resources:

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${ProjectName}-build"
      ServiceRole: !ImportValue
        Fn::Sub: "${ProjectName}-codebuild-role-arn"
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ECR_REPOSITORY_URI
            Value: !ImportValue
              Fn::Sub: "${ProjectName}-ecr-uri"
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-build.yaml
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${ProjectName}-pipeline"
      RoleArn: !ImportValue
        Fn::Sub: "${ProjectName}-codepipeline-role-arn"
      ArtifactStore:
        Type: S3
        Location: !ImportValue
          Fn::Sub: "${ProjectName}-artifact-bucket"
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref CodeConnectionArn
                FullRepositoryId: !Ref GitHubFullRepositoryId
                BranchName: !Ref GitHubBranch
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Build
          Actions:
            - Name: BuildAndPush
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref BuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput